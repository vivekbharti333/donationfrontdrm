<div class="row">
  <div class="col-sm-12 col-md-8 col-xl-8">
    <div class="card border-0 shadow-sm">

      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

          <!-- Super Admin Filters -->
          <div *ngIf="isSuperadmin" class="row g-3 align-items-end mb-4">

            <div class="col-lg-3 col-md-6 col-12">
              <label class="form-label requiredField">Select User</label>
              <mat-select #loginId placeholder="Select User">
                <mat-option *ngFor="let data of userList" [value]="data.loginId">
                  {{ data.firstName }} {{ data.lastName }}
                </mat-option>
              </mat-select>
            </div>

            <div class="col-lg-3 col-md-6 col-12">
              <label class="form-label requiredField">From</label>
              <input type="date" class="form-control" #firstDate>
            </div>

            <div class="col-lg-3 col-md-6 col-12">
              <label class="form-label requiredField">To</label>
              <input type="date" class="form-control" #lastDate>
            </div>

            <div class="col-lg-3 col-md-6 col-12">
              <button type="button" class="btn btn-warning w-100"
                (click)="getDonationPaymentModeCountAndAmountGroupByNameCustom(loginId?.value, firstDate.value, lastDate.value)">
                <i class="feather icon-search me-1"></i>
                Search
              </button>
            </div>

          </div>

          <!-- Normal User Filters -->
          <div *ngIf="!isSuperadmin" class="row g-3 align-items-end mb-4">

            <div class="col-lg-4 col-md-6 col-12">
              <label class="form-label requiredField">From</label>
              <input type="date" class="form-control" #firstDate>
            </div>

            <div class="col-lg-4 col-md-6 col-12">
              <label class="form-label requiredField">To</label>
              <input type="date" class="form-control" #lastDate>
            </div>

            <div class="col-lg-4 col-md-12 col-12">
              <button type="button" class="btn btn-warning w-100"
                (click)="getDonationPaymentModeCountAndAmountGroupByNameCustom('', firstDate.value, lastDate.value)">
                <i class="feather icon-search me-1"></i>
                Search
              </button>
            </div>

          </div>

          <!-- Report Table -->
          <div class="card border-0 shadow-sm">
            <div class="card-header">
              <!-- <h4 class="card-title mb-0">Donation Reports</h4> -->
            </div>

            <div class="card-body p-0">
              <div class="table-responsive" style="max-height: 450px;">
                <table class="table table-hover align-middle mb-0">

                  <thead class="table-light sticky-top">
                    <tr>
                      <th style="width: 40%;">Mode</th>
                      <th style="width: 20%;" class="text-center">Count</th>
                      <th style="width: 40%;" class="text-end">Amount</th>
                    </tr>
                  </thead>

                  <tbody>
  <ng-container *ngFor="let paymentMode of objectKeys(PaymentModeCountAmount)">
    <ng-container *ngFor="let row of PaymentModeCountAmount[paymentMode]">
      <tr>
        <td *ngIf="row === PaymentModeCountAmount[paymentMode][0]"
            [attr.rowspan]="PaymentModeCountAmount[paymentMode].length"
            class="fw-semibold">
          {{ paymentMode }}
        </td>

        <td class="text-center">{{ row[0] }}</td>

        <td class="text-end">
          {{ row[3] }} {{ row[1] }}
          <!-- <small class="text-muted">({{ row[2] }})</small> -->
        </td>
      </tr>
    </ng-container>
  </ng-container>

  <!-- <tr class="table-warning fw-bold">
    <td>Total</td>
    <td class="text-center">{{ totalCount }}</td>
    <td class="text-end">{{ totalAmount | number:'1.2-2' }}</td>
  </tr> -->

  <tr *ngIf="objectKeys(PaymentModeCountAmount).length === 0">
  <td colspan="3" class="text-center text-muted py-4">
    No Data Found
  </td>
</tr>

<tr *ngIf="totalCount > 0" class="table-warning fw-bold">
  <td>Total</td>
  <td class="text-center">{{ totalCount }}</td>
  <td class="text-end">
    ₹ {{ totalAmount | number:'1.2-2' }}
  </td>
</tr>
  
</tbody>

                  <!-- <tbody>
                    <ng-container *ngFor="let paymentMode of objectKeys(PaymentModeCountAmount)">
                      <ng-container *ngFor="let row of PaymentModeCountAmount[paymentMode]">
                        <tr>

                          <td *ngIf="row === PaymentModeCountAmount[paymentMode][0]"

                            {{ paymentMode }}

                          <td class="text-center">
                            {{ row[0] }}
                          </td>

                          <td class="text-end">
                            {{ row[3] }} {{ row[1] }}

                          </td>

                        </tr>
                      </ng-container>
                    </ng-container>
                  </tbody> -->

                </table>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
