<p-toast></p-toast>

<div class="account-content">
  <div class="login-wrapper bg-img">
    <div class="login-content">

      <form [formGroup]="changePasswordForm" (ngSubmit)="changeUserPasswordDirect()">

        <div class="login-userset">

          <!-- <div class="login-logo logo-normal">
            <img src="assets/img/logo.png" alt="Logo">
          </div> -->

          <!-- <a
            [routerLink]="routes.adminDashboard"
            class="login-logo logo-white">
            <img src="assets/img/logo-white.png" alt="Logo">
          </a> -->

          <div class="login-userheading">
            <h3>Reset Password</h3>
            <h4>Enter and confirm your new password.</h4>
          </div>

          <!-- New password -->
          <div class="form-login">
            <label for="password">New Password</label>

            <div class="pass-group">
              <input id="password" [type]="passwordVisible[0] ? 'text' : 'password'" class="form-control"
                formControlName="password" placeholder="Enter new password" autocomplete="new-password">

              <span class="fas toggle-passwords" [ngClass]="
                  passwordVisible[0]
                    ? 'fa-eye'
                    : 'fa-eye-slash'
                " (click)="togglePassword(0)">
              </span>
            </div>

            <small class="text-danger" *ngIf="
                passwordControl?.touched &&
                passwordControl?.hasError('required')
              ">
              Password is required.
            </small>

            <small class="text-danger" *ngIf="
                passwordControl?.touched &&
                passwordControl?.hasError('minlength')
              ">
              Password must contain at least 6 characters.
            </small>
          </div>

          <!-- Confirm password -->
          <div class="form-login">
            <label for="confirmPassword">Confirm Password</label>

            <div class="pass-group">
              <input id="confirmPassword" [type]="passwordVisible[1] ? 'text' : 'password'" class="form-control"
                formControlName="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">

              <span class="fas toggle-passworda" [ngClass]=" passwordVisible[1]? 'fa-eye': 'fa-eye-slash' " (click)="togglePassword(1)"></span>
            </div>

            <small class="text-danger" *ngIf="
                confirmPasswordControl?.touched &&
                confirmPasswordControl?.hasError('required')
              ">
              Confirm password is required.
            </small>

            <small class="text-danger" *ngIf="confirmPasswordControl?.touched &&
                changePasswordForm.hasError('passwordMismatch')">
              Password and confirm password do not match.
            </small>
          </div>

          <div class="form-login">
            <button type="submit" class="btn btn-login" [disabled]="changePasswordForm.invalid">
              Change Password
            </button>
          </div>

          <div class="signinform text-center">
            <h4>
              Return to
              <a [routerLink]="routes.signUp" class="hover-a">
                Login
              </a>
            </h4>
          </div>

          <div class="my-4 d-flex justify-content-center align-items-center copyright-text">
            <p> Copyright &copy; 2026 Datfuslab Technologies. All rights reserved.</p>
          </div>

        </div>
      </form>

    </div>
  </div>
</div>
